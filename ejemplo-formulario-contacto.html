<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Formulario de Contacto - Ritta Estudio</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Supabase JS -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gradient-to-br from-cream to-white">

<div class="min-h-screen flex items-center justify-center px-4 py-8">
  <div class="w-full max-w-md">
    <!-- Header -->
    <div class="text-center mb-8">
      <h1 class="text-3xl font-bold text-ink mb-2">Contacto</h1>
      <p class="text-muted">Cuéntanos sobre tu proyecto de diseño</p>
    </div>

    <!-- Formulario -->
    <form id="contactForm" class="space-y-6 bg-white rounded-lg shadow-lg p-8">

      <!-- Email -->
      <div>
        <label for="email" class="block text-sm font-medium text-ink mb-2">
          Tu email
        </label>
        <input
          type="email"
          id="email"
          name="email"
          placeholder="hola@example.com"
          required
          class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-ink"
        >
      </div>

      <!-- Nombre -->
      <div>
        <label for="name" class="block text-sm font-medium text-ink mb-2">
          Tu nombre
        </label>
        <input
          type="text"
          id="name"
          name="name"
          placeholder="Juan García"
          required
          class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-ink"
        >
      </div>

      <!-- Teléfono -->
      <div>
        <label for="phone" class="block text-sm font-medium text-ink mb-2">
          Teléfono (opcional)
        </label>
        <input
          type="tel"
          id="phone"
          name="phone"
          placeholder="+34 123 456 789"
          class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-ink"
        >
      </div>

      <!-- Mensaje -->
      <div>
        <label for="message" class="block text-sm font-medium text-ink mb-2">
          Tu mensaje
        </label>
        <textarea
          id="message"
          name="message"
          placeholder="Cuéntanos qué necesitas..."
          rows="5"
          required
          class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-ink"
        ></textarea>
      </div>

      <!-- Estado del formulario -->
      <div id="status" class="hidden p-4 rounded-lg text-sm font-medium">
        <!-- Mensajes de éxito/error aparecen aquí -->
      </div>

      <!-- Botón enviar -->
      <button
        type="submit"
        id="submitBtn"
        class="w-full bg-ink text-white py-3 rounded-lg font-semibold hover:bg-opacity-90 transition duration-300"
      >
        Enviar mensaje
      </button>

      <p class="text-xs text-muted text-center">
        Nos pondremos en contacto lo antes posible.
      </p>

    </form>
  </div>
</div>

<script>
  // Configuración Supabase
  const SUPABASE_URL = 'https://mefqkijoijoxqjledkib.supabase.co'
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1lZnFraWpvaWpveHFqbGVka2liIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQzODk2OTUsImV4cCI6MjA4OTk2NTY5NX0.HR4sPGhk0zH5uhulwhBWCzpCDkjmMFDte218Zsh_rDY'

  const { createClient } = window.supabase
  const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY)

  // Elementos del DOM
  const form = document.getElementById('contactForm')
  const statusDiv = document.getElementById('status')
  const submitBtn = document.getElementById('submitBtn')

  // Escuchar envío del formulario
  form.addEventListener('submit', async (e) => {
    e.preventDefault()

    // Deshabilitar botón
    submitBtn.disabled = true
    submitBtn.textContent = 'Enviando...'

    try {
      // Obtener datos del formulario
      const email = document.getElementById('email').value
      const name = document.getElementById('name').value
      const phone = document.getElementById('phone').value || null
      const message = document.getElementById('message').value

      // Guardar en Supabase
      const { data, error } = await supabase
        .from('contacts')
        .insert([{
          email,
          name,
          phone,
          message,
          created_at: new Date().toISOString(),
          status: 'nuevo'
        }])

      if (error) throw error

      // ✅ Éxito
      statusDiv.classList.remove('hidden', 'bg-red-100', 'text-red-800')
      statusDiv.classList.add('bg-green-100', 'text-green-800')
      statusDiv.textContent = '✅ ¡Mensaje enviado! Gracias por contactarnos.'

      // Limpiar formulario
      form.reset()

      // Reactivar botón después de 3 segundos
      setTimeout(() => {
        submitBtn.disabled = false
        submitBtn.textContent = 'Enviar mensaje'
        statusDiv.classList.add('hidden')
      }, 3000)

    } catch (error) {
      console.error('Error:', error)

      // ❌ Error
      statusDiv.classList.remove('hidden', 'bg-green-100', 'text-green-800')
      statusDiv.classList.add('bg-red-100', 'text-red-800')
      statusDiv.textContent = '❌ Error: ' + error.message

      // Reactivar botón
      submitBtn.disabled = false
      submitBtn.textContent = 'Enviar mensaje'
    }
  })
</script>

</body>
</html>
