<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Formulario de Contacto - Ritta Estudio</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-slate-100 to-white">

<div class="min-h-screen flex items-center justify-center px-4 py-8">
  <div class="w-full max-w-md">
    <div class="text-center mb-8">
      <h1 class="text-3xl font-bold text-slate-900 mb-2">Contacto</h1>
      <p class="text-slate-600">Cuéntanos sobre tu proyecto de diseño</p>
    </div>

    <form id="contactForm" class="space-y-6 bg-white rounded-lg shadow-lg p-8">
      <div>
        <label for="email" class="block text-sm font-medium text-slate-700 mb-2">Email</label>
        <input type="email" id="email" name="email" placeholder="tu@email.com" required
          class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
      </div>

      <div>
        <label for="name" class="block text-sm font-medium text-slate-700 mb-2">Nombre</label>
        <input type="text" id="name" name="name" placeholder="Tu nombre" required
          class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
      </div>

      <div>
        <label for="phone" class="block text-sm font-medium text-slate-700 mb-2">Teléfono (opcional)</label>
        <input type="tel" id="phone" name="phone" placeholder="+34 123 456 789"
          class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
      </div>

      <div>
        <label for="message" class="block text-sm font-medium text-slate-700 mb-2">Mensaje</label>
        <textarea id="message" name="message" placeholder="Tu mensaje..." rows="5" required
          class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"></textarea>
      </div>

      <div id="status" class="hidden p-4 rounded-lg text-sm font-medium"></div>

      <button type="submit" id="submitBtn" class="w-full bg-blue-600 text-white py-3 rounded-lg font-semibold hover:bg-blue-700 transition">
        Enviar mensaje
      </button>

      <p class="text-xs text-slate-500 text-center">Nos pondremos en contacto lo antes posible.</p>
    </form>
  </div>
</div>

<script>
  const form = document.getElementById('contactForm')
  const statusDiv = document.getElementById('status')
  const submitBtn = document.getElementById('submitBtn')

  form.addEventListener('submit', async (e) => {
    e.preventDefault()

    submitBtn.disabled = true
    submitBtn.textContent = 'Enviando...'

    try {
      const email = document.getElementById('email').value
      const name = document.getElementById('name').value
      const phone = document.getElementById('phone').value || null
      const message = document.getElementById('message').value

      // Enviar directamente a Supabase con fetch
      const response = await fetch('https://mefqkijoijoxqjledkib.supabase.co/rest/v1/contacts', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'apikey': 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1lZnFraWpvaWpveHFqbGVka2liIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQzODk2OTUsImV4cCI6MjA4OTk2NTY5NX0.HR4sPGhk0zH5uhulwhBWCzpCDkjmMFDte218Zsh_rDY',
          'Authorization': 'Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1lZnFraWpvaWpveHFxbGVka2liIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQzODk2OTUsImV4cCI6MjA4OTk2NTY5NX0.HR4sPGhk0zH5uhulwhBWCzpCDkjmMFDte218Zsh_rDY'
        },
        body: JSON.stringify({
          email,
          name,
          phone,
          message,
          status: 'nuevo',
          created_at: new Date().toISOString()
        })
      })

      if (!response.ok) {
        throw new Error(`Error: ${response.status}`)
      }

      // ✅ Éxito
      statusDiv.classList.remove('hidden', 'bg-red-100', 'text-red-800')
      statusDiv.classList.add('bg-green-100', 'text-green-800')
      statusDiv.textContent = '✅ ¡Mensaje enviado! Gracias por contactarnos.'

      form.reset()

      setTimeout(() => {
        submitBtn.disabled = false
        submitBtn.textContent = 'Enviar mensaje'
        statusDiv.classList.add('hidden')
      }, 3000)

    } catch (error) {
      console.error('Error:', error)

      statusDiv.classList.remove('hidden', 'bg-green-100', 'text-green-800')
      statusDiv.classList.add('bg-red-100', 'text-red-800')
      statusDiv.textContent = '❌ Error al enviar. Intenta nuevamente.'

      submitBtn.disabled = false
      submitBtn.textContent = 'Enviar mensaje'
    }
  })
</script>

</body>
</html>
